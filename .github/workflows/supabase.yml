# Un solo pipeline: migraciones y Edge Function gemini-proxy.
#
# Secretos (GitHub → Settings → Secrets → Actions):
#   SUPABASE_ACCESS_TOKEN  → https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_REF   → Project Settings → General → Reference ID
#
# workflow_dispatch ejecuta migraciones + función (útil tras configurar secretos).
# Si también usas la integración nativa Supabase↔GitHub, evita duplicar el mismo paso ahí.

name: Supabase

on:
  push:
    branches: [main, master]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - 'supabase/functions/**'
  workflow_dispatch:

concurrency:
  group: supabase-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      migrations: ${{ steps.filter.outputs.migrations }}
      functions: ${{ steps.filter.outputs.functions }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            migrations:
              - 'supabase/migrations/**'
              - 'supabase/config.toml'
            functions:
              - 'supabase/functions/**'

  migrate:
    needs: detect
    if: ${{ needs.detect.outputs.migrations == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Enlazar proyecto
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" --yes

      - name: Aplicar migraciones
        run: supabase db push

  functions:
    needs: detect
    if: ${{ needs.detect.outputs.functions == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Enlazar proyecto
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" --yes

      - name: Deploy gemini-proxy
        run: supabase functions deploy gemini-proxy --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
