# Despliega la Edge Function gemini-proxy cuando cambie su código.
# Mismos secretos que supabase-migrations.yml (SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF).

name: Supabase — Edge Functions

on:
  push:
    branches: [main, master]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

concurrency:
  group: supabase-functions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Enlazar proyecto
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Deploy gemini-proxy
        run: supabase functions deploy gemini-proxy --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
